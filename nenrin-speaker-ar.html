<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>年輪スピーカー — ARで見る</title>

  <!-- model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --ink:     #1a1a1a;
      --grain:   #f5f0eb;
      --ring:    #c8a97e;
      --ring2:   #8b6340;
      --btn-bg:  #1a1a1a;
      --btn-fg:  #ffffff;
      --radius:  999px;
      --safe-b:  env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--ink);
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* prevent pull-to-refresh bounce */
    }

    /* ── Layout ── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;          /* dynamic viewport height for mobile */
      padding: 0;
      position: relative;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      padding: 20px 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 10;
    }

    .header__label {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ring);
      font-family: 'Courier New', monospace;
    }

    .header__title {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--ink);
      line-height: 1.2;
    }

    /* ── Ring decoration (year-ring motif) ── */
    .ring-deco {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 380px);
      height: min(88vw, 380px);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .ring-deco::before,
    .ring-deco::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid;
      animation: ringPulse 4s ease-in-out infinite;
    }
    .ring-deco::before {
      border-color: rgba(200, 169, 126, 0.25);
      animation-delay: 0s;
    }
    .ring-deco::after {
      inset: 14px;
      border-color: rgba(139, 99, 64, 0.18);
      animation-delay: 0.8s;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.02); }
    }

    /* ── model-viewer ── */
    model-viewer {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: transparent;
      --poster-color: transparent;
      z-index: 1;
      position: relative;
    }

    /* Hide default AR button — we use our own */
    model-viewer::part(default-ar-button) {
      display: none;
    }

    /* ── Footer area ── */
    .footer {
      width: 100%;
      padding: 16px 32px calc(20px + var(--safe-b));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
      background: var(--white);
    }

    /* ── AR button ── */
    .btn-ar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 17px 28px;
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: var(--radius);
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      font-size: 16px;
      letter-spacing: 0.08em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(26,26,26,0.18);
    }

    .btn-ar:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(26,26,26,0.12);
    }

    /* Shimmer */
    .btn-ar::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      animation: shimmer 3s ease infinite;
    }

    @keyframes shimmer {
      0%   { left: -100%; }
      60%  { left: 160%;  }
      100% { left: 160%;  }
    }

    .btn-ar__icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ── Hint text ── */
    .hint {
      font-size: 11px;
      color: rgba(26,26,26,0.4);
      letter-spacing: 0.04em;
      text-align: center;
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    }

    /* ── AR not available notice ── */
    .no-ar-notice {
      display: none;
      font-size: 12px;
      color: rgba(26,26,26,0.45);
      text-align: center;
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
      padding: 0 24px;
    }

    /* ── Loading overlay ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--white);
      z-index: 20;
      transition: opacity 0.5s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader__rings {
      width: 56px;
      height: 56px;
      position: relative;
    }

    .loader__rings span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--ring);
      animation: spin 1.2s linear infinite;
    }

    .loader__rings span:nth-child(2) {
      inset: 8px;
      border-top-color: var(--ring2);
      animation-duration: 0.9s;
      animation-direction: reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader__text {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: rgba(26,26,26,0.4);
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Loading -->
  <div class="loader" id="loader">
    <div class="loader__rings">
      <span></span><span></span>
    </div>
    <div class="loader__text">LOADING...</div>
  </div>

  <!-- Header -->
  <div class="header">
    <span class="header__label">3D &amp; AR Viewer</span>
    <h1 class="header__title">年輪スピーカー</h1>
  </div>

  <!-- Year-ring decoration -->
  <div class="ring-deco" aria-hidden="true"></div>

  <!-- 3D Model -->
  <model-viewer
    id="mv"
    src="nenrin-speaker.glb"
    alt="年輪スピーカー 3Dモデル"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="1500"
    rotation-per-second="12deg"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="1.1"
    environment-image="neutral"
    reveal="auto"
  ></model-viewer>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-ar" id="arBtn" aria-label="ARで部屋に置いて見る">
      <!-- AR icon -->
      <svg class="btn-ar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 9V5a2 2 0 0 1 2-2h4"/>
        <path d="M16 3h4a2 2 0 0 1 2 2v4"/>
        <path d="M22 15v4a2 2 0 0 1-2 2h-4"/>
        <path d="M8 21H4a2 2 0 0 1-2-2v-4"/>
        <polyline points="12 8 12 16"/>
        <polyline points="8 12 16 12"/>
      </svg>
      部屋に置いて見る
    </button>
    <p class="hint">ドラッグで回転 · ピンチでズーム</p>
    <p class="no-ar-notice" id="noArNotice">
      お使いのブラウザはARに対応していません。<br>iPhone Safari / Android Chromeでお試しください。
    </p>
  </div>

</div>

<script>
  const mv      = document.getElementById('mv');
  const arBtn   = document.getElementById('arBtn');
  const loader  = document.getElementById('loader');
  const noAr    = document.getElementById('noArNotice');

  /* Hide loader when model is ready */
  mv.addEventListener('load', () => {
    loader.classList.add('hidden');
  });

  /* Fallback: hide loader after 6 s even on slow connections */
  setTimeout(() => loader.classList.add('hidden'), 6000);

  /* AR button → trigger model-viewer's built-in AR */
  arBtn.addEventListener('click', () => {
    if (mv.canActivateAR) {
      mv.activateAR();
    } else {
      noAr.style.display = 'block';
      arBtn.style.opacity = '0.45';
      arBtn.style.pointerEvents = 'none';
    }
  });

  /* Show notice if AR never becomes available */
  mv.addEventListener('ar-status', (e) => {
    if (e.detail.status === 'failed') {
      noAr.style.display = 'block';
    }
  });
</script>

</body>
</html>
